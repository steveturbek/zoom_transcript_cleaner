<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoom Transcript Cleaner</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* === Drop area: full-height centering before load === */
      #drop-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      body.loaded #drop-area {
        flex: 0;
        padding: 0;
      }

      #dropzone {
        width: 480px;
        padding: 60px 40px;
        background: #fff;
        border: 2.5px dashed #ccc;
        border-radius: 12px;
        text-align: center;
        user-select: none;
        transition:
          border-color 0.15s,
          background 0.15s;
      }

      body.loaded #dropzone {
        width: 100%;
        padding: 9px 24px;
        border-radius: 0;
        border: none;
        border-bottom: 1px solid #e0e0e0;
        text-align: left;
      }

      #dropzone.dragover,
      body.loaded #dropzone.dragover {
        border: 2px solid #0057ff !important;
        background: #f0f4ff !important;
      }

      #dropzone.error {
        border-color: #dc2626;
        background: #fef2f2;
      }
      #dropzone.error #status {
        color: #dc2626;
      }

      body.loaded .drop-icon,
      body.loaded h1 {
        display: none;
      }

      .drop-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        color: #111;
        margin-bottom: 8px;
      }
      #status {
        font-size: 13px;
        color: #666;
        line-height: 1.5;
      }

      /* === Toolbar === */
      #toolbar {
        display: none;
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        padding: 8px 24px;
        align-items: center;
        gap: 16px;
      }

      body.loaded #toolbar {
        display: flex;
      }

      #toolbar label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #333;
        cursor: pointer;
      }

      #copy-btn {
        padding: 6px 16px;
        background: #fff;
        color: #333;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }

      #copy-btn:hover {
        background: #f5f5f5;
      }

      #download-btn {
        margin-left: 8px;
        padding: 6px 16px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }

      #download-btn:hover {
        background: #444;
      }

      /* === Transcript preview === */
      #preview-wrap {
        display: none;
        flex: 1;
        overflow-y: auto;
        padding: 40px 48px;
      }

      body.loaded #preview-wrap {
        display: block;
      }

      #preview {
        max-width: 760px;
        margin: 0 auto;
        outline: none;
        font-size: 15px;
        line-height: 1.8;
        color: #1a1a1a;
      }

      #preview p {
        margin-bottom: 0.85em;
      }
      #preview p:last-child {
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div id="drop-area">
      <div id="dropzone">
        <div class="drop-icon">📄</div>
        <h1>Zoom Transcript Cleaner</h1>
        <p id="status">Drop the <strong>Zoom meeting folder</strong> or <strong>meeting_saved_closed_caption.txt</strong> anywhere on this page</p>
      </div>
    </div>

    <div id="toolbar">
      <button id="download-btn">Download .txt</button>
      <button id="copy-btn">Copy Speaker Text with AI Quote Finder Prompt</button>
      <label>
        <input type="checkbox" id="filter-cb" checked />
        <span id="filter-label">Guest only</span>
      </label>
    </div>

    <div id="preview-wrap">
      <div id="preview" contenteditable="true" spellcheck="false"></div>
    </div>

    <script>
      const HOST = "Steve Turbek";
      const SPEAKER_LINE = /^\[(.+?)\]\s+\d+:\d+:\d+\s*$/;

      const FILLERS = new Set([
        "absolutely.",
        "all right!",
        "all right.",
        "awesome!",
        "awesome.",
        "Definitely.",
        "That's fascinating.",
        "hmm!",
        "hmm, mm-hmm.",
        "hmm.",
        "hmm...",
        "hmm…",
        "Nope.",
        "it's okay.",
        "love it.",
        "mm-hmm.",
        "Mm-hmm, sure.",
        "oh okay!",
        "oh okay.",
        "oh, good point.",
        "oh, okay!",
        "oh, okay.",
        "oh, yeah.",
        "oh, yeah, sure.",
        "okay!",
        "okay, awesome.",
        "okay, hmm.",
        "okay, love it.",
        "okay, so…",
        "okay, that's great.",
        "okay.",
        "right.",
        "right?",
        "Right, right.",
        "so.",
        "so…",
        "sure!",
        "sure.",
        "Sure, um…",
        "That's… that's awesome.",
        "totally good.",
        "um, so…",
        "wow!",
        "wow.",
        "yeah!",
        "yeah,",
        "yeah, absolutely.",
        "yeah, definitely.",
        "yeah, go ahead.",
        "yeah, got it.",
        "yeah, that's awesome.",
        "yeah.",
        "yep.",
        "yes.",
      ]);

      let baseFilename = "transcript";

      function parse(raw) {
        const lines = raw.split(/\r?\n/);
        const entries = [];
        let current = null;

        for (const line of lines) {
          const m = line.match(SPEAKER_LINE);
          if (m) {
            if (current) entries.push(current);
            current = { speaker: m[1].trim(), parts: [] };
          } else if (current && line.trim()) {
            current.parts.push(line.trim());
          }
        }
        if (current) entries.push(current);
        return entries.map((e) => ({ speaker: e.speaker, text: e.parts.join(" ") }));
      }

      function removeFiller(text) {
        const sentences = text.split(/(?<=[.!?…])\s+/);
        const kept = sentences
          .filter((s) => !FILLERS.has(s.replace(/^-\s*/, "").toLowerCase().trim()))
          .map((s) => {
            const stripped = s.replace(/^(?:um|uh)(?:,|…|\.\.\.)\s*/i, "");
            return stripped !== s ? stripped.charAt(0).toUpperCase() + stripped.slice(1) : s;
          });
        return { text: kept.join(" ").trim(), removed: sentences.length - kept.length, total: sentences.length };
      }

      function clean(entries) {
        let fillerRemoved = 0, fillerTotal = 0;
        const filtered = entries
          .map((e) => {
            const { text, removed, total } = removeFiller(e.text);
            fillerRemoved += removed;
            fillerTotal += total;
            return { ...e, text: text.replace(/^-\s*/, "").trim() };
          })
          .filter((e) => e.text.length > 1);

        const merged = [];
        for (const entry of filtered) {
          if (merged.length > 0 && merged[merged.length - 1].speaker === entry.speaker) {
            merged[merged.length - 1].text += " " + entry.text;
          } else {
            merged.push({ ...entry });
          }
        }

        const wc = (t) => t.split(/\s+/).filter(Boolean).length;
        let hostWords = 0, guestWords = 0;
        for (const row of merged) {
          if (row.speaker === HOST) hostWords += wc(row.text);
          else guestWords += wc(row.text);
        }
        const totalWords = hostWords + guestWords;

        return {
          rows: merged,
          stats: {
            fillerPct: fillerTotal > 0 ? Math.round(fillerRemoved / fillerTotal * 100) : 0,
            hostPct: totalWords > 0 ? Math.round(hostWords / totalWords * 100) : 0,
            guestPct: totalWords > 0 ? Math.round(guestWords / totalWords * 100) : 0,
          },
        };
      }

      function esc(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function renderPreview(rows) {
        return rows
          .map((r) => {
            const line = `${esc(r.speaker)}: ${esc(r.text)}`;
            return r.speaker === HOST ? `<p>${line}</p>` : `<p><strong>${line}</strong></p>`;
          })
          .join("");
      }

      // Read rows back from the (possibly edited) contenteditable
      function getRowsFromPreview() {
        const rows = [];
        for (const p of document.getElementById("preview").querySelectorAll("p")) {
          const text = p.textContent.trim();
          if (!text) continue;
          const isHost = !p.querySelector("strong, b");
          const sep = text.indexOf(": ");
          rows.push(sep > -1 ? { speaker: text.slice(0, sep), text: text.slice(sep + 2), isHost } : { speaker: "", text, isHost });
        }
        return rows;
      }

      function handleCopyForAI() {
        const guestOnly = document.getElementById("filter-cb").checked;
        const rows = getRowsFromPreview();
        const filtered = guestOnly ? rows.filter((r) => !r.isHost) : rows;
        const transcript = filtered
          .filter((r) => r.text)
          .map((r) => (guestOnly ? r.text : r.speaker ? `${r.speaker}: ${r.text}` : r.text))
          .join("\n\n");

        const prompt =
          `Here is a cleaned interview transcript. Find the 5 most interesting, insightful, or quotable moments from the guest. ` +
          `For each, include the exact quote and one sentence on why it stands out.\n\n---\n\n${transcript}`;

        navigator.clipboard.writeText(prompt).then(() => {
          const btn = document.getElementById("copy-btn");
          btn.textContent = "Copied!";
          setTimeout(() => (btn.textContent = "Copy for AI"), 2000);
        });
      }

      function handleDownload() {
        const guestOnly = document.getElementById("filter-cb").checked;
        const rows = getRowsFromPreview();
        let content, filename;

        if (guestOnly) {
          const guestRows = rows.filter((r) => !r.isHost);
          content = guestRows.map((r) => r.text).join("\n\n");
          const guestNames = [...new Set(rows.filter((r) => !r.isHost && r.speaker).map((r) => r.speaker))];
          const slug = (guestNames[0] || "guest").replace(/\s+/g, "_");
          filename = `${baseFilename}_CLEANED_${slug}_ONLY.txt`;
        } else {
          content = rows
            .filter((r) => r.text)
            .map((r) => (r.speaker ? `${r.speaker}: ${r.text}` : r.text))
            .join("\n\n");
          filename = `${baseFilename}_CLEANED.txt`;
        }

        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      }

      function setState(state, message) {
        const dz = document.getElementById("dropzone");
        dz.className = state || "";
        if (message) document.getElementById("status").innerHTML = message;
      }

      function processFile(file, folderName) {
        if (!file || !file.name.endsWith(".txt")) {
          setState("error", "Please drop a <strong>.txt</strong> file or Zoom folder");
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const entries = parse(e.target.result);
            if (entries.length === 0) {
              setState("error", "No transcript entries found. Is this a Zoom closed-caption file?");
              return;
            }

            const { rows, stats } = clean(entries);
            baseFilename = folderName || file.name.replace(/\.txt$/i, "");
            const displayName = folderName ? `📁 ${folderName}` : file.name;

            const guestNames = [...new Set(rows.filter((r) => r.speaker !== HOST).map((r) => r.speaker))];
            const labelName = guestNames.length === 1 ? guestNames[0] : "guests";
            document.getElementById("filter-label").textContent = `Only: ${labelName}`;

            document.getElementById("preview").innerHTML = renderPreview(rows);
            document.body.classList.add("loaded");
            setState("", `${rows.length} rows &middot; ${stats.fillerPct}% fillers removed &middot; ${esc(HOST)}: ${stats.hostPct}% &middot; ${esc(labelName)}: ${stats.guestPct}% &middot; ${esc(displayName)}`);
          } catch (err) {
            setState("error", `Error: ${err.message}`);
          }
        };
        reader.onerror = () => setState("error", "Could not read the file.");
        reader.readAsText(file);
      }

      document.getElementById("copy-btn").addEventListener("click", handleCopyForAI);
      document.getElementById("download-btn").addEventListener("click", handleDownload);

      document.addEventListener("dragover", (e) => {
        e.preventDefault();
        document.getElementById("dropzone").classList.add("dragover");
      });

      document.addEventListener("dragleave", (e) => {
        if (!e.relatedTarget) document.getElementById("dropzone").classList.remove("dragover");
      });

      document.addEventListener("drop", (e) => {
        e.preventDefault();
        document.getElementById("dropzone").classList.remove("dragover");

        const item = e.dataTransfer.items && e.dataTransfer.items[0];
        const entry = item && item.webkitGetAsEntry && item.webkitGetAsEntry();

        if (entry && entry.isDirectory) {
          const folderName = entry.name;
          entry.createReader().readEntries((children) => {
            const txtEntry = children.find((c) => c.isFile && c.name.endsWith(".txt"));
            if (!txtEntry) {
              setState("error", "No .txt file found inside the dropped folder");
              return;
            }
            txtEntry.file((file) => processFile(file, folderName));
          }, () => setState("error", "Could not read the dropped folder"));
        } else {
          processFile(e.dataTransfer.files[0]);
        }
      });
    </script>
  </body>
</html>
